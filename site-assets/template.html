<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE}} · {{SITE_TITLE}}</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<header class="topbar">
  <button id="menuBtn" aria-label="메뉴 열기">☰</button>
  <a class="brand" href="./index.html">🛡️ {{SITE_TITLE}}</a>
  <a class="gh" href="{{REPO_URL}}" target="_blank" rel="noopener">GitHub ↗</a>
</header>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav>{{SIDEBAR}}</nav>
  </aside>
  <main class="content">
    <article class="markdown-body">
      {{CONTENT}}
    </article>
    <footer class="pagefoot">
      <p>이 사이트는 학습용 비공식 자료입니다. 모든 내용은 <a href="https://learn.microsoft.com/security-copilot/" target="_blank" rel="noopener">Microsoft Learn</a> 공식 문서를 근거로 합니다.</p>
    </footer>
  </main>
</div>
<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
mermaid.initialize({ startOnLoad: true, securityLevel: 'loose', theme: 'default' });
const btn = document.getElementById('menuBtn');
const sb = document.getElementById('sidebar');
btn && btn.addEventListener('click', () => sb.classList.toggle('open'));
</script>
</body>
</html>
