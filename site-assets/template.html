<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PAGE_TITLE}} · {{SITE_TITLE}}</title>
<meta name="description" content="Microsoft Security Copilot 실전 가이드 — 공식 문서 기반 한국어 학습 코스">
<script>
(function(){
  try {
    var saved = localStorage.getItem('theme');
    var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (sysDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  } catch(e){}
})();
</script>
<link rel="stylesheet" href="./style.css?v={{CSS_VER}}">
</head>
<body class="{{BODY_CLASS}}">
<header class="topbar">
  <button id="menuBtn" aria-label="메뉴 열기">☰</button>
  <a class="brand" href="./index.html">
    <span class="brand-mark">🛡️</span>
    <span class="brand-text">Security Copilot <b>실전 가이드</b></span>
  </a>
  <button id="themeBtn" class="theme-btn" aria-label="테마 전환" title="라이트/다크 전환"><span class="theme-ico">🌙</span></button>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav>{{SIDEBAR}}</nav>
  </aside>

  <main class="content">
    {{BREADCRUMB}}
    <article class="markdown-body">
      {{CONTENT}}
    </article>
    {{PREVNEXT}}
    <footer class="pagefoot">
      <p>이 사이트는 학습용 비공식 자료입니다. 모든 내용은 <a href="https://learn.microsoft.com/security-copilot/" target="_blank" rel="noopener">Microsoft Learn</a> 공식 문서를 근거로 합니다.</p>
    </footer>
  </main>

  <aside class="toc" id="toc">{{TOC}}</aside>
</div>

<script type="module">
import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
// 원본 다이어그램 소스를 렌더 전에 보관 (테마 전환 시 재렌더용)
document.querySelectorAll('.mermaid').forEach(n => { n.dataset.src = n.textContent; });
function mermaidTheme(){
  return document.documentElement.getAttribute('data-theme') === 'dark'
    ? { theme:'base', themeVariables:{ primaryColor:'#2a2340', primaryBorderColor:'#a98ce0', primaryTextColor:'#ece8f7', lineColor:'#a98ce0', fontFamily:'Segoe UI' } }
    : { theme:'base', themeVariables:{ primaryColor:'#f3ecff', primaryBorderColor:'#8661c5', primaryTextColor:'#20123a', lineColor:'#8661c5', fontFamily:'Segoe UI' } };
}
mermaid.initialize(Object.assign({ startOnLoad:true, securityLevel:'loose' }, mermaidTheme()));

const btn = document.getElementById('menuBtn');
const sb = document.getElementById('sidebar');
btn && btn.addEventListener('click', () => sb.classList.toggle('open'));

// 테마 토글
const themeBtn = document.getElementById('themeBtn');
function syncThemeIcon(){
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const ico = themeBtn && themeBtn.querySelector('.theme-ico');
  if (ico) ico.textContent = dark ? '☀️' : '🌙';
}
syncThemeIcon();
themeBtn && themeBtn.addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  try { localStorage.setItem('theme', next); } catch(e){}
  syncThemeIcon();
  // Mermaid 다이어그램을 원본 소스로 되돌린 뒤 새 테마로 재렌더
  const nodes = document.querySelectorAll('.mermaid');
  if (nodes.length) {
    nodes.forEach(n => { n.innerHTML = n.dataset.src || n.textContent; n.removeAttribute('data-processed'); });
    mermaid.initialize(Object.assign({ startOnLoad:false, securityLevel:'loose' }, mermaidTheme()));
    mermaid.run({ nodes: document.querySelectorAll('.mermaid') });
  }
});

// TOC 활성 항목 하이라이트
const links = [...document.querySelectorAll('.toc a')];
if (links.length) {
  const map = new Map(links.map(a => [a.getAttribute('href').slice(1), a]));
  const obs = new IntersectionObserver((entries) => {
    for (const e of entries) {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const a = map.get(e.target.id);
        a && a.classList.add('active');
      }
    }
  }, { rootMargin: '-64px 0px -70% 0px' });
  document.querySelectorAll('h2[id],h3[id]').forEach(h => obs.observe(h));
}

// 프롬프트 복사 버튼
const CHECK_SVG = '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
document.querySelectorAll('.prompt-copy').forEach(btn => {
  const original = btn.innerHTML;
  btn.addEventListener('click', async () => {
    const text = btn.getAttribute('data-copy') || '';
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      btn.classList.add('copied');
      btn.innerHTML = CHECK_SVG;
      btn.setAttribute('title', '복사됨');
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = original;
        btn.setAttribute('title', '복사');
      }, 1400);
    } catch (e) {}
  });
});
</script>
</body>
</html>
